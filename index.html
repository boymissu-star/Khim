<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Tuner PRO - Precision Engine</title>
    <style>
        :root {
            --wood-dark: #3e2723; --wood-main: #5d4037; --accent-blue: #00f2fe; 
            --bridge-red: #b71c1c; --gold: #f1c40f; --white: #ffffff;
            --tuner-bg: #26c6da;
        }

        body {
            margin: 0; padding: 0; font-family: 'Tahoma', sans-serif;
            background-color: #1a1a1a; color: var(--white); overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .app-container {
            width: 100vw; height: 100vh; max-width: 1200px;
            background: #fdf5e6; display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        @media (min-width: 768px) and (orientation: landscape) {
            .app-container { flex-direction: row; height: 90vh; border-radius: 20px; overflow: hidden; }
            .left-panel { flex: 1.2; border-right: 4px solid var(--bridge-red); }
            .right-panel { flex: 1; }
        }

        .left-panel { display: flex; flex-direction: column; flex: 1.2; min-height: 0; }
        .instrument-section {
            background: #e5d9c5; padding: 10px; text-align: center; flex: 0.7;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #khim-svg { width: 100%; max-width: 400px; height: auto; }
        .khim-string { stroke: #1a0f0d; stroke-width: 0.8; opacity: 0.8; }
        .highlight-bar { stroke: var(--accent-blue); stroke-width: 5; stroke-linecap: round; opacity: 0; transition: opacity 0.2s; }
        .highlight-bar.active { opacity: 1; }

        .tuner-display {
            background: linear-gradient(to bottom, #4dd0e1, #00acc1);
            padding: 10px; text-align: center; border-top: 6px solid #d32f2f; flex: 1.3;
            display: flex; flex-direction: column; justify-content: space-around;
        }

        .note-name { font-size: 2.2em; font-weight: bold; }
        .target-hz { font-size: 2.5em; font-weight: bold; margin: 0; color: #fff; }
        .detected-hz { font-size: 1.2em; color: rgba(0,0,0,0.5); font-family: monospace; }
        
        .diff-box {
            background: var(--gold); color: #b71c1c; 
            display: inline-block; padding: 8px 35px; border-radius: 12px;
            font-size: 2em; font-weight: bold; margin: 5px 0;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .scale-container {
            width: 90%; margin: 10px auto; position: relative; height: 70px;
            border-bottom: 2px solid rgba(255,255,255,0.6);
        }
        .scale-marks {
            width: 100%; height: 100%;
            background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.4) 0px, rgba(255,255,255,0.4) 2px, transparent 2px, transparent 5%);
        }
        .scale-labels { display: flex; justify-content: space-between; font-weight: bold; }
        .center-needle {
            position: absolute; left: 50%; bottom: 0; width: 6px; height: 50px;
            background: #ffeb3b; transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.4); transition: left 0.05s linear;
        }

        .right-panel { display: flex; flex-direction: column; flex: 1; background: var(--bridge-red); }
        .bridge-tabs { display: flex; background: #2d1b18; padding: 8px; gap: 5px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 8px; font-weight: bold; color: #aaa; font-size: 0.85em; }
        .tab.active { background: var(--bridge-red); color: var(--white); }

        .note-grid { padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; overflow-y: auto; flex: 1; }
        .note-btn {
            background: rgba(255,255,255,0.1); padding: 12px; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .note-btn.active { background: var(--gold); }
        .note-btn .n { font-size: 1.3em; font-weight: bold; color: white; }
        .note-btn.active .n { color: #7b241c; }

        #start-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { padding: 15px 60px; font-size: 1.6em; background: var(--gold); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: #7b241c; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="start-overlay">
        <h1 style="color: var(--gold);">Thai Tuner Precision</h1>
        <p style="color: white">ระบบประมวลผลความละเอียดสูงสำหรับขิม</p>
        <button id="start-btn">เริ่มตั้งสาย</button>
    </div>

    <div class="left-panel">
        <section class="instrument-section">
            <svg id="khim-svg" viewBox="0 0 140 85">
                <path d="M25,10 L115,10 Q140,10 135,40 Q130,75 115,77 L25,77 Q10,75 5,40 Q0,10 25,10 Z" fill="var(--wood-dark)"/>
                <path d="M28,13 L112,13 Q132,13 128,40 Q124,70 112,72 L28,72 Q15,70 11,40 Q7,13 28,13 Z" fill="var(--wood-main)"/>
                <g class="khim-strings">
                    <line x1="12" y1="20" x2="128" y2="20" class="khim-string"/><line x1="12" y1="28" x2="128" y2="28" class="khim-string"/>
                    <line x1="12" y1="36" x2="128" y2="36" class="khim-string"/><line x1="12" y1="44" x2="128" y2="44" class="khim-string"/>
                    <line x1="12" y1="52" x2="128" y2="52" class="khim-string"/><line x1="12" y1="60" x2="128" y2="60" class="khim-string"/>
                    <line x1="12" y1="68" x2="128" y2="68" class="khim-string"/>
                </g>
                <g id="highlight-layer">
                    <line id="h-L-7" x1="25" y1="20" x2="45" y2="20" class="highlight-bar"/><line id="h-L-6" x1="25" y1="28" x2="45" y2="28" class="highlight-bar"/>
                    <line id="h-M-7" x1="60" y1="20" x2="80" y2="20" class="highlight-bar"/><line id="h-M-6" x1="60" y1="28" x2="80" y2="28" class="highlight-bar"/>
                    <line id="h-R-7" x1="95" y1="20" x2="115" y2="20" class="highlight-bar"/><line id="h-R-6" x1="95" y1="28" x2="115" y2="28" class="highlight-bar"/>
                    <!-- เพิ่มจุดอื่นๆ ให้ครบตาม JS -->
                </g>
            </svg>
        </section>

        <section class="tuner-display" id="display-bg">
            <div class="note-info">
                <div class="note-name" id="display-note">ซอล (สูง)</div>
                <div class="target-hz" id="display-hz-target">755.7 Hz</div>
                <div class="detected-hz">รับเสียงได้: <span id="live-hz">0.0</span> Hz</div>
            </div>
            <div><div class="diff-box" id="diff-val">0 Hz</div></div>
            <div class="scale-container">
                <div class="scale-labels"><span>-20</span><span>-10</span><span>0</span><span>10</span><span>20</span></div>
                <div class="scale-marks"></div>
                <div class="center-needle" id="needle"></div>
            </div>
        </section>
    </div>

    <div class="right-panel">
        <div class="bridge-tabs">
            <div class="tab active" onclick="switchBridge('left')">หย่องนอก</div>
            <div class="tab" onclick="switchBridge('middle')">หย่องกลาง</div>
            <div class="tab" onclick="switchBridge('right')">หย่องใน</div>
        </div>
        <nav id="note-grid" class="note-grid"></nav>
    </div>
</div>

<script>
    const noteData = {
        left: [ {n:"ซอล (สูง)", hz:755.7, r:7}, {n:"ฟาร์", hz:684.4, r:6}, {n:"มี", hz:619.9, r:5}, {n:"เร", hz:561.5, r:4}, {n:"โด", hz:508.5, r:3}, {n:"ที", hz:460.0, r:2}, {n:"ลา", hz:417.2, r:1} ],
        middle: [ {n:"โด", hz:508.5, r:7}, {n:"ที", hz:460.0, r:6}, {n:"ลา", hz:417.2, r:5}, {n:"ซอล", hz:377.8, r:4}, {n:"ฟาร์", hz:342.2, r:3}, {n:"มี", hz:309.9, r:2}, {n:"เร", hz:280.7, r:1} ],
        right: [ {n:"ฟาร์", hz:342.2, r:7}, {n:"มี", hz:309.9, r:6}, {n:"เร", hz:280.7, r:5}, {n:"โด", hz:254.2, r:4}, {n:"ที", hz:230.3, r:3}, {n:"ลา", hz:208.5, r:2}, {n:"ซอล", hz:118.9, r:1} ]
    };

    let audioContext, analyser, targetHz = 755.7, currentBridge = 'left';

    // --- YIN Algorithm Engine ---
    function yinPitch(buffer, sampleRate) {
        const threshold = 0.15;
        const len = Math.floor(buffer.length / 2);
        const df = new Float32Array(len);

        // Difference function
        for (let tau = 0; tau < len; tau++) {
            for (let i = 0; i < len; i++) {
                const delta = buffer[i] - buffer[i + tau];
                df[tau] += delta * delta;
            }
        }

        // Cumulative mean normalized difference
        const cmndf = new Float32Array(len);
        cmndf[0] = 1;
        let sum = 0;
        for (let tau = 1; tau < len; tau++) {
            sum += df[tau];
            cmndf[tau] = df[tau] / (sum / tau);
        }

        // Absolute threshold
        let tau = -1;
        for (let t = 1; t < len; t++) {
            if (cmndf[t] < threshold) {
                tau = t;
                break;
            }
        }

        if (tau === -1) return -1;

        // Parabolic interpolation for sub-bin accuracy
        let betterTau;
        const x0 = tau - 1, x2 = tau + 1;
        if (x2 >= len) betterTau = tau;
        else {
            const s0 = cmndf[x0], s1 = cmndf[tau], s2 = cmndf[x2];
            betterTau = tau + (s2 - s0) / (2 * (2 * s1 - s2 - s0));
        }

        return sampleRate / betterTau;
    }

    async function startTuner() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false } });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048; 
            audioContext.createMediaStreamSource(stream).connect(analyser);
            document.getElementById('start-overlay').style.display = 'none';
            update();
        } catch (e) { alert("ไมโครโฟนเข้าถึงไม่ได้"); }
    }

    function update() {
        const buffer = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buffer);
        
        const pitch = yinPitch(buffer, audioContext.sampleRate);
        
        // กรองค่าที่ผิดปกติออก (ขิมปกติจะไม่เกิน 1000Hz และไม่ต่ำกว่า 100Hz)
        if (pitch > 80 && pitch < 1200) {
            document.getElementById('live-hz').innerText = pitch.toFixed(1);
            const diff = pitch - targetHz;
            
            // แสดงค่าส่วนต่าง
            document.getElementById('diff-val').innerText = (diff > 0 ? "+" : "") + diff.toFixed(1) + " Hz";
            
            // ปรับเข็ม (1 Hz = 5% เพื่อให้เข็มไวและเห็นชัด)
            let percent = 50 + (diff * 5); 
            percent = Math.max(2, Math.min(98, percent));
            document.getElementById('needle').style.left = percent + "%";
            
            // สีแจ้งเตือน
            if (Math.abs(diff) < 0.8) {
                document.getElementById('display-bg').style.background = "#2ecc71"; // เขียวเมื่อตรง
            } else {
                document.getElementById('display-bg').style.background = "linear-gradient(to bottom, #4dd0e1, #00acc1)";
            }
        }
        requestAnimationFrame(update);
    }

    function switchBridge(bridge) {
        currentBridge = bridge;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        renderNotes();
    }

    function renderNotes() {
        const grid = document.getElementById('note-grid');
        grid.innerHTML = '';
        noteData[currentBridge].forEach(item => {
            const btn = document.createElement('div');
            btn.className = 'note-btn' + (item.hz === targetHz ? ' active' : '');
            btn.innerHTML = `<span class="n">${item.n}</span><span style="font-size:0.8em">${item.hz}Hz</span>`;
            btn.onclick = () => {
                targetHz = item.hz;
                document.getElementById('display-note').innerText = item.n;
                document.getElementById('display-hz-target').innerText = item.hz + " Hz";
                renderNotes();
            };
            grid.appendChild(btn);
        });
    }

    document.getElementById('start-btn').onclick = startTuner;
    window.onload = renderNotes;
</script>
</body>
</html>
