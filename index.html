<!DOCTYPE html>
<html lang="th">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Tuner - ขิม</title>

        :root {
            --bg-dark: #3e332d;
            --bg-red: #a4332d;

            --accent-blue: #2e86c1;

        }

        body {
            margin: 0;

            font-family: 'Tahoma', sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh; /* ปรับให้เต็มจอไม่มี Header */
            background: var(--bg-cream);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* ส่วนแสดงรูปขิม - ขยายพื้นที่ขึ้น */
        .instrument-section {

            text-align: center;
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .khim-placeholder {
            width: 90%;
            max-width: 300px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        .instrument-label {
            background: white;
            color: var(--bg-dark);
            padding: 8px 50px;
            border-radius: 25px;

            margin-top: 25px;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border: 2px solid #bdc3c7;
        }
