<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Tuner - ขิม</title>
    <style>
        :root {
            --bg-dark: #3e332d;
            --bg-red: #a4332d;
            --bg-cream: #e5d9c5;
            --accent-green: #48c9b0;
            --accent-blue: #2e86c1;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Tahoma', sans-serif;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        /* จำลองหน้าจอมือถือ */
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 90vh;
            background: var(--bg-cream);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 10px;
        }

        /* Header */
        header {
            background-color: var(--bg-dark);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1em;
        }

        .back-btn { cursor: pointer; }

        /* ส่วนแสดงรูปขิม */
        .instrument-section {
            background: radial-gradient(circle, #f0e6d6 0%, #dcc8ac 100%);
            padding: 20px;
            text-align: center;
            flex: 1;
        }

        .khim-placeholder {
            width: 80%;
            margin: 0 auto;
            display: block;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }

        .instrument-label {
            background: white;
            color: #333;
            padding: 5px 40px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* ส่วนแสดงผล Tuner */
        .tuner-display {
            background: linear-gradient(to bottom, var(--accent-green), var(--accent-blue));
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .note-name { font-size: 1.5em; margin-bottom: 5px; }
        .frequency { font-size: 2em; font-weight: bold; }
        
        .offset-label {
            background: #f1c40f;
            color: #b03a2e;
            padding: 2px 20px;
            border-radius: 15px;
            display: inline-block;
            margin: 10px 0;
            font-weight: bold;
        }

        /* เข็มวัดเสียง */
        .meter-container {
            width: 100%;
            height: 60px;
            position: relative;
            margin-top: 10px;
        }

        .meter-scale {
            width: 100%;
            height: 100%;
            border-top: 1px solid rgba(255,255,255,0.5);
            background-image: repeating-linear-gradient(90deg, transparent, transparent 19%, rgba(255,255,255,0.5) 20%);
            background-size: 20% 20px;
            background-repeat: no-repeat;
            background-position: bottom;
        }

        .needle {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 4px;
            height: 40px;
            background: #ffeb3b;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255,235,59,0.8);
            transition: left 0.2s ease-out; /* สำหรับให้เข็มขยับลื่น */
        }

        /* ปุ่มกดด้านล่าง */
        .note-selector {
            background-color: var(--bg-red);
            padding: 30px 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .note-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            transform: rotate(45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .note-btn.active {
            background: rgba(255,255,255,0.4);
            box-shadow: 0 0 15px white;
        }

        .note-btn span {
            transform: rotate(-45deg);
            font-size: 0.9em;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="back-btn"> ❮ ประเภท</div>
            <div>เทียบเสียง</div>
            <div>ประวัติ</div>
        </header>

        <section class="instrument-section">
            <img src="https://cdn-icons-png.flaticon.com/512/3233/3233497.png" alt="Khim" class="khim-placeholder">
            <div class="instrument-label">ขิม</div>
        </section>

        <section class="tuner-display">
            <div class="note-name" id="display-note">ซอล ๓</div>
            <div class="frequency" id="display-hz">188.9 Hz</div>
            <div class="offset-label" id="offset-hz">0 Hz</div>
            
            <div class="meter-container">
                <div class="meter-scale"></div>
                <div class="needle" id="needle"></div>
            </div>
        </section>

        <nav class="note-selector">
            <div class="note-btn active"><span>ซอล ๓</span></div>
            <div class="note-btn"><span>ลา ๒</span></div>
            <div class="note-btn"><span>ที ๒</span></div>
            <div class="note-btn"><span>โด</span></div>
        </nav>
    </div>

    <script>
        // Mockup ข้อมูลความถี่
        const khimNotes = {
            "ซอล ๓": 188.9,
            "ลา ๒": 212.5,
            "ที ๒": 239.0,
            "โด": 268.6
        };

        const buttons = document.querySelectorAll('.note-btn');
        const displayNote = document.getElementById('display-note');
        const displayHz = document.getElementById('display-hz');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // เปลี่ยนสถานะปุ่ม
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // อัปเดตหน้าจอ
                const note = btn.innerText;
                displayNote.innerText = note;
                displayHz.innerText = khimNotes[note] + " Hz";
            });
        });

        // ฟังก์ชันจำลองเข็มแกว่ง (เมื่อมี Logic ไมค์จริง ค่านี้จะมาจากไมค์)
        setInterval(() => {
            const randomOffset = (Math.random() * 10) - 5; // แกว่งนิดๆ
            const needle = document.getElementById('needle');
            needle.style.left = `calc(50% + ${randomOffset}px)`;
        }, 500);
    </script>
</body>
</html>
