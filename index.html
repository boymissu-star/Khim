<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Tuner PRO - Full Scale Edition</title>
    <style>
        :root {
            --wood-dark: #3e2723; --wood-main: #5d4037; --accent-blue: #00f2fe; 
            --bridge-red: #b71c1c; --gold: #f1c40f; --white: #ffffff;
            --tuner-bg: #26c6da; /* สีเขียวมิ้นต์ตามรูป */
            --string-dark: #1a0f0d; 
        }

        body {
            margin: 0; padding: 0; font-family: 'Tahoma', sans-serif;
            background-color: #1a1a1a; color: var(--white); overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .app-container {
            width: 100vw; height: 100vh; max-width: 1200px;
            background: #fdf5e6; display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        @media (min-width: 768px) and (orientation: landscape) {
            .app-container { flex-direction: row; height: 90vh; border-radius: 20px; overflow: hidden; }
            .left-panel { flex: 1.2; border-right: 4px solid var(--bridge-red); }
            .right-panel { flex: 1; }
        }

        .left-panel { display: flex; flex-direction: column; flex: 1.2; min-height: 0; }
        
        .instrument-section {
            background: #e5d9c5; padding: 15px; text-align: center; flex: 0.8;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #khim-svg { width: 100%; max-width: 450px; height: auto; }
        .khim-string { stroke: var(--string-dark); stroke-width: 0.8; opacity: 0.9; }
        .highlight-bar {
            stroke: var(--accent-blue); stroke-width: 5; stroke-linecap: round;
            opacity: 0; transition: opacity 0.2s; filter: drop-shadow(0 0 8px var(--accent-blue));
        }
        .highlight-bar.active { opacity: 1; }

        /* ส่วน Tuner ใหม่ที่ทำให้เหมือนในรูป */
        .tuner-display {
            background: linear-gradient(to bottom, #4dd0e1, #00acc1);
            padding: 10px; text-align: center; border-top: 6px solid #d32f2f; flex: 1.2;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative;
        }

        .note-info { margin-top: 10px; }
        .note-name { font-size: 2.2em; font-weight: bold; color: rgba(255,255,255,0.9); }
        .target-hz { font-size: 2.8em; font-weight: bold; margin: 0; }
        
        .diff-box {
            background: var(--gold); color: #b71c1c; 
            display: inline-block; padding: 5px 30px; border-radius: 10px;
            font-size: 1.8em; font-weight: bold; margin: 10px 0;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        /* แถบไม้วัดความแม่นยำ */
        .scale-container {
            width: 90%; margin: 0 auto 20px auto; position: relative; height: 60px;
            border-bottom: 2px solid rgba(255,255,255,0.5);
        }
        .scale-marks {
            width: 100%; height: 100%;
            background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.5), rgba(255,255,255,0.5) 2px, transparent 2px, transparent 5%);
        }
        .scale-labels {
            display: flex; justify-content: space-between; padding: 0 5px;
            font-size: 1.2em; font-weight: bold; color: rgba(255,255,255,0.8);
        }
        .center-needle {
            position: absolute; left: 50%; bottom: 0; width: 4px; height: 45px;
            background: #ffeb3b; transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.3); transition: left 0.1s ease-out;
        }

        .right-panel { display: flex; flex-direction: column; flex: 1; background: var(--bridge-red); }
        .bridge-tabs { display: flex; background: #2d1b18; padding: 8px; gap: 5px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 8px; font-weight: bold; color: #aaa; font-size: 0.85em; }
        .tab.active { background: var(--bridge-red); color: var(--white); }

        .note-grid { padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; overflow-y: auto; flex: 1; }
        
        .note-btn {
            background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center;
            border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
        }
        .note-btn.active { background: var(--gold); border-color: white; }
        .note-btn .n { font-size: 1.4em; font-weight: bold; color: white; }
        .note-btn .h { font-size: 0.9em; color: rgba(255,255,255,0.7); }
        .note-btn.active .n, .note-btn.active .h { color: #7b241c; }

        #start-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { padding: 15px 50px; font-size: 1.5em; background: var(--gold); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: #7b241c; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="start-overlay">
        <h1 style="color: var(--gold);">Thai Tuner PRO</h1>
        <button id="start-btn">เริ่มใช้งาน</button>
    </div>

    <div class="left-panel">
        <section class="instrument-section">
            <svg id="khim-svg" viewBox="0 0 140 85">
                <path d="M25,10 L115,10 Q140,10 135,40 Q130,75 115,77 L25,77 Q10,75 5,40 Q0,10 25,10 Z" fill="var(--wood-dark)"/>
                <path d="M28,13 L112,13 Q132,13 128,40 Q124,70 112,72 L28,72 Q15,70 11,40 Q7,13 28,13 Z" fill="var(--wood-main)"/>
                <rect x="55" y="15" width="2.5" height="58" rx="1" fill="var(--bridge-red)"/> 
                <rect x="85" y="15" width="2.5" height="58" rx="1" fill="var(--bridge-red)"/> 

                <g class="khim-strings">
                    <line x1="12" y1="20" x2="128" y2="20" class="khim-string"/><line x1="12" y1="28" x2="128" y2="28" class="khim-string"/>
                    <line x1="12" y1="36" x2="128" y2="36" class="khim-string"/><line x1="12" y1="44" x2="128" y2="44" class="khim-string"/>
                    <line x1="12" y1="52" x2="128" y2="52" class="khim-string"/><line x1="12" y1="60" x2="128" y2="60" class="khim-string"/>
                    <line x1="12" y1="68" x2="128" y2="68" class="khim-string"/>
                </g>

                <g id="highlight-layer">
                    <line id="h-L-7" x1="25" y1="20" x2="45" y2="20" class="highlight-bar"/><line id="h-L-6" x1="25" y1="28" x2="45" y2="28" class="highlight-bar"/>
                    <line id="h-L-5" x1="25" y1="36" x2="45" y2="36" class="highlight-bar"/><line id="h-L-4" x1="25" y1="44" x2="45" y2="44" class="highlight-bar"/>
                    <line id="h-L-3" x1="25" y1="52" x2="45" y2="52" class="highlight-bar"/><line id="h-L-2" x1="25" y1="60" x2="45" y2="60" class="highlight-bar"/>
                    <line id="h-L-1" x1="25" y1="68" x2="45" y2="68" class="highlight-bar"/>

                    <line id="h-M-7" x1="60" y1="20" x2="80" y2="20" class="highlight-bar"/><line id="h-M-6" x1="60" y1="28" x2="80" y2="28" class="highlight-bar"/>
                    <line id="h-M-5" x1="60" y1="36" x2="80" y2="36" class="highlight-bar"/><line id="h-M-4" x1="60" y1="44" x2="80" y2="44" class="highlight-bar"/>
                    <line id="h-M-3" x1="60" y1="52" x2="80" y2="52" class="highlight-bar"/><line id="h-M-2" x1="60" y1="60" x2="80" y2="60" class="highlight-bar"/>
                    <line id="h-M-1" x1="60" y1="68" x2="80" y2="68" class="highlight-bar"/>

                    <line id="h-R-7" x1="95" y1="20" x2="115" y2="20" class="highlight-bar"/><line id="h-R-6" x1="95" y1="28" x2="115" y2="28" class="highlight-bar"/>
                    <line id="h-R-5" x1="95" y1="36" x2="115" y2="36" class="highlight-bar"/><line id="h-R-4" x1="95" y1="44" x2="115" y2="44" class="highlight-bar"/>
                    <line id="h-R-3" x1="95" y1="52" x2="115" y2="52" class="highlight-bar"/><line id="h-R-2" x1="95" y1="60" x2="115" y2="60" class="highlight-bar"/>
                    <line id="h-R-1" x1="95" y1="68" x2="115" y2="68" class="highlight-bar"/>
                </g>
            </svg>
        </section>

        <section class="tuner-display" id="display-bg">
            <div class="note-info">
                <div class="note-name" id="display-note">ซอล (สูง)</div>
                <div class="target-hz" id="display-hz-target">755.7 Hz</div>
            </div>

            <div>
                <div class="diff-box" id="diff-val">0 Hz</div>
            </div>

            <div class="scale-container">
                <div class="scale-labels"><span>-20</span><span>-10</span><span>0</span><span>10</span><span>20</span></div>
                <div class="scale-marks"></div>
                <div class="center-needle" id="needle"></div>
            </div>
        </section>
    </div>

    <div class="right-panel">
        <div class="bridge-tabs">
            <div class="tab active" onclick="switchBridge('left')">หย่องนอก (ซ้าย)</div>
            <div class="tab" onclick="switchBridge('middle')">หย่องกลาง</div>
            <div class="tab" onclick="switchBridge('right')">หย่องใน (ขวา)</div>
        </div>
        <nav id="note-grid" class="note-grid"></nav>
    </div>
</div>

<script>
    const noteData = {
        left: [ {n:"ซอล (สูง)", hz:755.7, r:7}, {n:"ฟาร์", hz:684.4, r:6}, {n:"มี", hz:619.9, r:5}, {n:"เร", hz:561.5, r:4}, {n:"โด", hz:508.5, r:3}, {n:"ที", hz:460.0, r:2}, {n:"ลา", hz:417.2, r:1} ],
        middle: [ {n:"โด", hz:508.5, r:7}, {n:"ที", hz:460.0, r:6}, {n:"ลา", hz:417.2, r:5}, {n:"ซอล", hz:377.8, r:4}, {n:"ฟาร์", hz:342.2, r:3}, {n:"มี", hz:309.9, r:2}, {n:"เร", hz:280.7, r:1} ],
        right: [ {n:"ฟาร์", hz:342.2, r:7}, {n:"มี", hz:309.9, r:6}, {n:"เร", hz:280.7, r:5}, {n:"โด", hz:254.2, r:4}, {n:"ที", hz:230.3, r:3}, {n:"ลา", hz:208.5, r:2}, {n:"ซอล", hz:118.9, r:1} ]
    };

    let audioContext, analyser, targetHz = 755.7, currentBridge = 'left';

    function highlightStrings(hz) {
        document.querySelectorAll('.highlight-bar').forEach(s => s.classList.remove('active'));
        Object.keys(noteData).forEach(bKey => {
            noteData[bKey].forEach(n => {
                if (Math.abs(n.hz - hz) < 0.5) {
                    const prefix = bKey === 'left' ? 'L' : bKey === 'middle' ? 'M' : 'R';
                    const el = document.getElementById(`h-${prefix}-${n.r}`);
                    if (el) el.classList.add('active');
                }
            });
        });
    }

    function switchBridge(bridge) {
        currentBridge = bridge;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(window.event) window.event.currentTarget.classList.add('active');
        renderNotes();
    }

    function renderNotes() {
        const grid = document.getElementById('note-grid');
        grid.innerHTML = '';
        noteData[currentBridge].forEach(item => {
            const btn = document.createElement('div');
            btn.className = 'note-btn';
            if (item.hz === targetHz) btn.classList.add('active');
            btn.innerHTML = `<span class="n">${item.n}</span><span class="h">${item.hz} Hz</span>`;
            btn.onclick = () => {
                targetHz = item.hz;
                document.getElementById('display-note').innerText = item.n;
                document.getElementById('display-hz-target').innerText = item.hz + " Hz";
                renderNotes();
                highlightStrings(targetHz);
            };
            grid.appendChild(btn);
        });
    }

    async function startTuner() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 4096;
            audioContext.createMediaStreamSource(stream).connect(analyser);
            document.getElementById('start-overlay').style.display = 'none';
            update();
        } catch (e) { alert("อนุญาตไมโครโฟนเพื่อใช้งาน"); }
    }

    function update() {
        const buffer = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buffer);
        const pitch = autoCorrelate(buffer, audioContext.sampleRate);
        
        if (pitch !== -1 && pitch < 1000) {
            const diff = pitch - targetHz;
            document.getElementById('diff-val').innerText = (diff > 0 ? "+" : "") + diff.toFixed(1) + " Hz";
            
            // การคำนวณตำแหน่งเข็มบนสเกล -20 ถึง 20
            let percent = 50 + (diff * 2.5); // 1 Hz = 2.5% ของพื้นที่สเกล
            percent = Math.max(5, Math.min(95, percent));
            document.getElementById('needle').style.left = percent + "%";
            
            if (Math.abs(diff) < 1.0) {
                document.getElementById('display-bg').style.background = "#2ecc71";
            } else {
                document.getElementById('display-bg').style.background = "linear-gradient(to bottom, #4dd0e1, #00acc1)";
            }
        }
        requestAnimationFrame(update);
    }

    function autoCorrelate(buf, sr) {
        let rms = 0; for (let i=0; i<buf.length; i++) rms += buf[i]*buf[i];
        if (Math.sqrt(rms/buf.length)<0.015) return -1;
        let c = new Array(buf.length).fill(0);
        for (let i=0; i<buf.length; i++) for (let j=0; j<buf.length-i; j++) c[i] += buf[j]*buf[j+i];
        let d=0; while (c[d]>c[d+1]) d++;
        let maxval=-1, maxpos=-1;
        for (let i=d; i<buf.length; i++) if (c[i]>maxval) { maxval=c[i]; maxpos=i; }
        return sr/maxpos;
    }

    document.getElementById('start-btn').onclick = startTuner;
    window.onload = () => { renderNotes(); highlightStrings(targetHz); };
</script>
</body>
</html>
