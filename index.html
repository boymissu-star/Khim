<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Tuner - Interactive Khim</title>
    <style>
        :root {
            --wood-dark: #3e2723; --wood-main: #5d4037; --wood-light: #8d6e63;
            --accent-blue: #00f2fe; --bridge-red: #b71c1c; --gold: #f1c40f;
        }

        body {
            margin: 0; background: #1a1a1a; color: white;
            font-family: 'Tahoma', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .container {
            width: 100%; max-width: 900px; background: #e5d9c5;
            border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); height: 90vh;
        }

        /* ส่วนแสดงผลขิม */
        .khim-display {
            flex: 1.5; background: radial-gradient(circle, #fdf5e6 0%, #d2b48c 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; padding: 20px;
        }

        #khim-svg { width: 100%; max-width: 600px; height: auto; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); }

        /* สไตล์เส้นไฮไลท์ */
        .highlight-bar {
            stroke: var(--accent-blue); stroke-width: 4; stroke-linecap: round;
            opacity: 0; transition: opacity 0.2s, stroke-width 0.2s;
            filter: drop-shadow(0 0 5px var(--accent-blue));
        }
        .highlight-bar.active { opacity: 1; stroke-width: 5; }

        /* ส่วนควบคุมและตั้งสาย */
        .controls {
            flex: 1; background: var(--bridge-red); display: flex; flex-direction: column;
        }

        .bridge-selector {
            display: flex; background: #2d1b18; padding: 5px;
        }
        .tab {
            flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #aaa; font-weight: bold;
        }
        .tab.active { color: white; background: var(--bridge-red); border-radius: 10px 10px 0 0; }

        .note-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 20px;
            flex-grow: 1; overflow-y: auto; align-content: center;
        }

        .note-btn {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
            aspect-ratio: 1; display: flex; justify-content: center; align-items: center;
            border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 1.2em;
        }
        .note-btn.active { background: var(--gold); color: #3e2723; transform: scale(1.1); box-shadow: 0 0 15px var(--gold); }

        .status-panel {
            background: #222; padding: 15px; text-align: center; border-top: 2px solid var(--gold);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="khim-display">
        <svg id="khim-svg" viewBox="0 0 140 80" xmlns="http://www.w3.org/2000/svg">
            <!-- ตัวขิม (Body) -->
            <path d="M30,10 L110,10 Q135,10 130,40 Q125,75 110,77 L30,77 Q15,75 10,40 Q5,10 30,10 Z" fill="var(--wood-dark)"/>
            <path d="M33,13 L107,13 Q128,13 124,40 Q120,70 107,72 L33,72 Q20,70 16,40 Q12,13 33,13 Z" fill="var(--wood-main)"/>
            
            <!-- หย่อง (Bridges) 3 แถว -->
            <rect x="45" y="15" width="3" height="50" rx="1.5" fill="var(--bridge-red)"/> <!-- ซ้าย -->
            <rect x="70" y="15" width="3" height="50" rx="1.5" fill="var(--bridge-red)"/> <!-- กลาง -->
            <rect x="95" y="15" width="3" height="50" rx="1.5" fill="var(--bridge-red)"/> <!-- ขวา -->

            <!-- สายขิม (Background Strings) -->
            <g stroke="#333" stroke-width="0.2" opacity="0.4">
                <line x1="20" y1="20" x2="120" y2="20"/> <line x1="20" y1="27" x2="120" y2="27"/>
                <line x1="20" y1="34" x2="120" y2="34"/> <line x1="20" y1="41" x2="120" y2="41"/>
                <line x1="20" y1="48" x2="120" y2="48"/> <line x1="20" y1="55" x2="120" y2="55"/>
                <line x1="20" y1="62" x2="120" y2="62"/>
            </g>

            <!-- เลเยอร์ไฮไลท์ (สีทับเส้น) -->
            <g id="highlight-layer">
                <!-- แถว 1-7: ฝั่งซ้าย (Left), กลาง (Mid), ขวา (Right) -->
                <!-- แถว 7 (บนสุด) -->
                <line id="h-left-7" x1="25" y1="20" x2="43" y2="20" class="highlight-bar"/>
                <line id="h-mid-7" x1="48" y1="20" x2="68" y2="20" class="highlight-bar"/>
                <line id="h-right-7" x1="73" y1="20" x2="93" y2="20" class="highlight-bar"/>
                <!-- แถว 6 -->
                <line id="h-left-6" x1="25" y1="27" x2="43" y2="27" class="highlight-bar"/>
                <line id="h-mid-6" x1="48" y1="27" x2="68" y2="27" class="highlight-bar"/>
                <line id="h-right-6" x1="73" y1="27" x2="93" y2="27" class="highlight-bar"/>
                <!-- แถว 5 -->
                <line id="h-left-5" x1="25" y1="34" x2="43" y2="34" class="highlight-bar"/>
                <line id="h-mid-5" x1="48" y1="34" x2="68" y2="34" class="highlight-bar"/>
                <line id="h-right-5" x1="73" y1="34" x2="93" y2="34" class="highlight-bar"/>
                <!-- แถว 4 -->
                <line id="h-left-4" x1="25" y1="41" x2="43" y2="41" class="highlight-bar"/>
                <line id="h-mid-4" x1="48" y1="41" x2="68" y2="41" class="highlight-bar"/>
                <line id="h-right-4" x1="73" y1="41" x2="93" y2="41" class="highlight-bar"/>
                <!-- แถว 3 -->
                <line id="h-left-3" x1="25" y1="48" x2="43" y2="48" class="highlight-bar"/>
                <line id="h-mid-3" x1="48" y1="48" x2="68" y2="48" class="highlight-bar"/>
                <line id="h-right-3" x1="73" y1="48" x2="93" y2="48" class="highlight-bar"/>
                <!-- แถว 2 -->
                <line id="h-left-2" x1="25" y1="55" x2="43" y2="55" class="highlight-bar"/>
                <line id="h-mid-2" x1="48" y1="55" x2="68" y2="55" class="highlight-bar"/>
                <line id="h-right-2" x1="73" y1="55" x2="93" y2="55" class="highlight-bar"/>
                <!-- แถว 1 (ล่างสุด) -->
                <line id="h-left-1" x1="25" y1="62" x2="43" y2="62" class="highlight-bar"/>
                <line id="h-mid-1" x1="48" y1="62" x2="68" y2="62" class="highlight-bar"/>
                <line id="h-right-1" x1="73" y1="62" x2="93" y2="62" class="highlight-bar"/>
            </g>
        </svg>
        <h3 id="display-text" style="color: var(--wood-dark); margin-top: 10px;">เลือกโน้ตที่ต้องการตั้งสาย</h3>
    </div>

    <div class="controls">
        <div class="bridge-selector">
            <div class="tab" onclick="switchBridge('left')">หย่องซ้าย</div>
            <div class="tab active" onclick="switchBridge('middle')">หย่องกลาง</div>
            <div class="tab" onclick="switchBridge('right')">หย่องขวา</div>
        </div>
        <div id="note-grid" class="note-grid"></div>
        <div class="status-panel">
            <span id="note-name-display" style="font-size: 1.5em; font-weight: bold; color: var(--gold);">---</span>
        </div>
    </div>
</div>

<script>
    const noteData = {
        left: [
            {n:"ซ", row:7}, {n:"ฟ", row:6}, {n:"ม", row:5}, {n:"ร", row:4}, {n:"ด", row:3}, {n:"ท", row:2}, {n:"ล", row:1}
        ],
        middle: [
            {n:"ร", row:7}, {n:"ด", row:6}, {n:"ท", row:5}, {n:"ล", row:4}, {n:"ซ", row:3}, {n:"ฟ", row:2}, {n:"ม", row:1}
        ],
        right: [
            {n:"ท", row:7}, {n:"ล", row:6}, {n:"ซ", row:5}, {n:"ฟ", row:4}, {n:"ม", row:3}, {n:"ร", row:2}, {n:"ด", row:1}
        ]
    };

    let currentBridge = 'middle';

    function switchBridge(bridge) {
        currentBridge = bridge;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderNotes();
    }

    function renderNotes() {
        const grid = document.getElementById('note-grid');
        grid.innerHTML = '';
        noteData[currentBridge].forEach(item => {
            const btn = document.createElement('div');
            btn.className = 'note-btn';
            btn.innerText = item.n;
            btn.onclick = () => {
                document.querySelectorAll('.note-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // อัปเดตการแสดงผลข้อความ
                document.getElementById('note-name-display').innerText = `โน้ต: ${item.n} (${currentBridge})`;
                
                // ไฮไลท์เส้นขิม
                activateHighlight(currentBridge, item.row);
            };
            grid.appendChild(btn);
        });
    }

    function activateHighlight(bridge, row) {
        // ลบไฮไลท์เก่า
        document.querySelectorAll('.highlight-bar').forEach(el => el.classList.remove('active'));
        
        // แมปชื่อ bridge เป็น prefix ของ ID
        const prefixMap = { 'left': 'h-left', 'middle': 'h-mid', 'right': 'h-right' };
        const targetId = `${prefixMap[bridge]}-${row}`;
        
        const targetElement = document.getElementById(targetId);
        if (targetElement) {
            targetElement.classList.add('active');
        }
    }

    // เริ่มต้น
    window.onload = renderNotes;
</script>

</body>
</html>
