<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Boymissu Khim Tuner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1610; --panel: #161616; --surface: #1f1f1f; --border: #2a2a2a;
  --accent: #d4a849; --cyan: #00f2fe; --green: #4caf7d; --text: #e8e0d0; --muted: #6b6558;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Overlay สำหรับแก้ปัญหารันไม่ได้ */
#overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
.overlay-content { text-align: center; }
.overlay-title { font-family: 'Bebas Neue', cursive; font-size: 3.5rem; color: var(--accent); margin-bottom: 10px; }
#start-btn { font-family: 'Bebas Neue', cursive; font-size: 1.5rem; padding: 15px 50px; background: var(--accent); border: none; border-radius: 8px; cursor: pointer; color: #000; box-shadow: 0 0 20px rgba(212,168,73,0.4); }

/* Layout */
.main-container { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.khim-view { flex: 1.2; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }
#khim-svg { width: 100%; max-width: 500px; height: auto; }

.controls-view { flex: 1; background: var(--panel); display: flex; flex-direction: column; border-top: 1px solid var(--border); }
.tabs { display: flex; background: #000; }
.tab { flex: 1; padding: 15px; text-align: center; color: var(--muted); cursor: pointer; font-weight: 600; font-size: 0.9rem; }
.tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: var(--panel); }

.note-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 15px; }
.note-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px 5px; text-align: center; cursor: pointer; }
.note-btn.active { border-color: var(--cyan); background: rgba(0, 242, 254, 0.1); }
.note-btn-name { display: block; font-weight: 600; font-size: 1rem; }
.note-btn-hz { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--muted); }

/* Meter */
.meter-info { position: absolute; top: 20px; right: 20px; text-align: right; }
.hz-display { font-family: 'IBM Plex Mono', monospace; font-size: 1.5rem; font-weight: 600; color: var(--cyan); }
</style>
</head>
<body>

<div id="overlay">
    <div class="overlay-content">
        <div class="overlay-title">KHIM TUNER PRO</div>
        <button id="start-btn">เริ่มใช้งาน (Start)</button>
        <p style="margin-top:15px; color:var(--muted); font-size:0.8rem;">กรุณาอนุญาตการเข้าถึงไมโครโฟน</p>
    </div>
</div>

<div class="main-container">
    <div class="khim-view">
        <div class="meter-info">
            <div id="note-display" style="font-size: 0.8rem; color: var(--muted);">โน้ตที่เลือก</div>
            <div id="live-hz" class="hz-display">0.0 Hz</div>
        </div>
        
        <svg id="khim-svg" viewBox="0 0 160 100">
            <path d="M25,20 L135,20 Q155,20 150,50 Q145,82 135,85 L25,85 Q15,82 10,50 Q5,20 25,20Z" fill="#3d2b1a" stroke="#221105" stroke-width="1.5"/>
            <line x1="35" y1="22" x2="35" y2="83" stroke="#8b4513" stroke-width="2" opacity="0.6"/> <line x1="72" y1="22" x2="72" y2="83" stroke="#b71c1c" stroke-width="2.5"/> <line x1="102" y1="22" x2="102" y2="83" stroke="#b71c1c" stroke-width="2.5"/> <line x1="138" y1="22" x2="138" y2="83" stroke="#8b4513" stroke-width="2" opacity="0.6"/> <g id="strings-group"></g>
        </svg>
    </div>

    <div class="controls-view">
        <div class="tabs">
            <div class="tab" id="tab-left" onclick="changeBridge('left')">หย่องนอก</div>
            <div class="tab active" id="tab-middle" onclick="changeBridge('middle')">หย่องกลาง</div>
            <div class="tab" id="tab-right" onclick="changeBridge('right')">หย่องใน</div>
        </div>
        <div id="note-grid" class="note-grid"></div>
    </div>
</div>

<script>
// ข้อมูลความถี่ (คงเดิมตามที่คุณต้องการ)
const hzData = {
    left: [754.6, 683.4, 618.9, 560.5, 507.6, 459.7, 416.3],
    middle: [508.5, 460.5, 417.0, 377.6, 342.0, 309.7, 280.5],
    right: [342.0, 309.7, 280.5, 254.0, 230.0, 208.3, 188.6]
};
const noteNames = {
    left: ["ซอล", "ฟาร์", "มี", "เร", "โด", "ที", "ลา"],
    middle: ["โด", "ที", "ลา", "ซอล", "ฟาร์", "มี", "เร"],
    right: ["ฟาร์", "มี", "เร", "โด", "ที", "ลา", "ซอล"]
};

let currentBridge = 'middle';
let targetHz = 508.5;
let audioCtx, analyser;

// สร้างสายขิมและระบบ Hilight
function initKhim() {
    const group = document.getElementById('strings-group');
    group.innerHTML = '';
    for (let i = 0; i < 7; i++) {
        const y = 29 + (i * 8.4);
        // วาดสายหลัก
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', '22'); line.setAttribute('y1', y);
        line.setAttribute('x2', '148'); line.setAttribute('y2', y);
        line.setAttribute('stroke', '#a67c52'); line.setAttribute('stroke-width', '0.3');
        group.appendChild(line);

        // พื้นที่ Hilight (3 ช่วง)
        const zones = [
            { id: 'left', x1: 35, x2: 72 },
            { id: 'middle', x1: 72, x2: 102 },
            { id: 'right', x1: 102, x2: 138 }
        ];
        zones.forEach(z => {
            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('id', `hl-${z.id}-${i}`);
            rect.setAttribute('x', z.x1); rect.setAttribute('y', y - 2);
            rect.setAttribute('width', z.x2 - z.x1); rect.setAttribute('height', '4');
            rect.setAttribute('rx', '1'); rect.setAttribute('fill', 'var(--cyan)');
            rect.setAttribute('opacity', '0');
            rect.style.transition = 'opacity 0.2s';
            group.appendChild(rect);
        });
    }
}

function updateHighlight() {
    document.querySelectorAll('[id^="hl-"]').forEach(el => el.style.opacity = '0');
    for (const b in hzData) {
        hzData[b].forEach((hz, idx) => {
            if (Math.abs(hz - targetHz) < 1.0) {
                const el = document.getElementById(`hl-${b}-${idx}`);
                if (el) el.style.opacity = '0.9';
            }
        });
    }
}

function renderGrid() {
    const grid = document.getElementById('note-grid');
    grid.innerHTML = '';
    noteNames[currentBridge].forEach((name, i) => {
        const hz = hzData[currentBridge][i];
        const btn = document.createElement('div');
        btn.className = `note-btn ${Math.abs(hz - targetHz) < 0.1 ? 'active' : ''}`;
        btn.innerHTML = `<span class="note-btn-name">${name}</span><span class="note-btn-hz">${hz} Hz</span>`;
        btn.onclick = () => {
            targetHz = hz;
            document.getElementById('note-display').innerText = `ตั้งสาย: ${name}`;
            renderGrid();
            updateHighlight();
        };
        grid.appendChild(btn);
    });
}

function changeBridge(b) {
    currentBridge = b;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + b).classList.add('active');
    renderGrid();
}

// ฟังก์ชันเริ่ม Audio (สำคัญมากสำหรับการรันบนเว็บ)
async function startAudio() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        
        document.getElementById('overlay').style.display = 'none';
        updateHighlight();
        processAudio();
    } catch (err) {
        alert("กรุณาเปิดไมโครโฟนเพื่อใช้งาน");
    }
}

function processAudio() {
    const data = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(data);
    
    // ตรงนี้คือจุดที่อัลกอริทึม YIN/AMDF เดิมของคุณจะทำงาน
    // เพื่อความกระชับ ผมจะข้ามตัว Logic คำนวณเสียงที่คุณมีอยู่แล้ว (ห้ามแก้ส่วนนั้น)
    // แต่ให้มั่นใจว่าเรียก updateUI() เมื่อได้ความถี่ครับ
    
    requestAnimationFrame(processAudio);
}

window.onload = () => {
    initKhim();
    renderGrid();
};

document.getElementById('start-btn').addEventListener('click', startAudio);
</script>
</body>
</html>
