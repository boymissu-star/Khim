<script>
    // ข้อมูลโน้ตและค่าความถี่ (เดี๋ยวคุณมาแก้เลข Hz ตรงนี้ได้เลย)
    const noteData = {
        left: [ {n:"ล", hz:880.0}, {n:"ซ", hz:784.0}, {n:"ฟ", hz:698.5}, {n:"ม", hz:659.3}, {n:"ร", hz:587.3}, {n:"ด", hz:523.3}, {n:"ท", hz:493.9} ],
        middle: [ {n:"ร", hz:440.0}, {n:"ด", hz:392.0}, {n:"ท", hz:349.2}, {n:"ล", hz:329.6}, {n:"ซ", hz:293.7}, {n:"ฟ", hz:261.6}, {n:"ม", hz:246.9} ],
        right: [ {n:"ท", hz:220.0}, {n:"ล", hz:196.0}, {n:"ซ", hz:174.6}, {n:"ฟ", hz:164.8}, {n:"ม", hz:146.8}, {n:"ร", hz:130.8}, {n:"ด", hz:123.5} ]
    };

    let audioContext, analyser, targetHz = 293.7;

    // ฟังก์ชันคำนวณหาค่าความต่างเป็น Cent
    // สูตร: 1200 * log2(f2 / f1)
    function getCents(currentHz, targetHz) {
        return Math.floor(1200 * Math.log2(currentHz / targetHz));
    }

    async function update() {
        const buffer = new Float32Array(2048);
        analyser.getFloatTimeDomainData(buffer);
        const pitch = autoCorrelate(buffer, audioContext.sampleRate);

        if (pitch !== -1 && pitch < 2000) {
            document.getElementById('display-hz').innerText = pitch.toFixed(1);
            
            // คำนวณความต่างเป็น Cent
            const centsOff = getCents(pitch, targetHz);
            
            // แสดงผลเลข Hz ที่ต่างกัน (เพื่อให้คนตั้งสายดูง่าย)
            const hzDiff = (pitch - targetHz).toFixed(1);
            document.getElementById('offset-hz').innerText = (hzDiff > 0 ? "+" : "") + hzDiff + " Hz";

            // การขยับเข็ม (อิงตาม Cent: สเกลหน้าปัดกว้าง +- 50 Cents)
            let moveX = centsOff * 3; // 1 Cent ขยับ 3px
            if (moveX > 150) moveX = 150; 
            if (moveX < -150) moveX = -150;
            document.getElementById('needle').style.left = `calc(50% + ${moveX}px)`;

            // เช็คระยะ 3 Cents (ครอบคลุมทั้ง +3 และ -3)
            if (Math.abs(centsOff) <= 3) {
                document.getElementById('display-bg').style.background = "#2ecc71"; // สีเขียวเมื่อเป๊ะ
                document.getElementById('offset-hz').style.color = "white";
                document.getElementById('offset-hz').innerText = "ตรงเสียง (±3 Cents)";
            } else {
                document.getElementById('display-bg').style.background = "linear-gradient(to bottom, var(--accent-green), var(--accent-blue))";
                document.getElementById('offset-hz').style.color = "#7b241c";
            }
        }
        requestAnimationFrame(update);
    }
    
    // ... ส่วนฟังก์ชันอื่นๆ (filterNotes, startTuner, autoCorrelate) ยังคงเหมือนเดิม ...
</script>
