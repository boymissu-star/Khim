<div class="khim-panel">
    <svg id="khim-svg" viewBox="0 0 160 100">
        <path d="M22,15 L138,15 Q162,15 157,48 Q152,86 138,88 L22,88 Q7,86 3,48 Q-2,15 22,15Z" fill="#2d1f14" stroke="#1a110a" stroke-width="1"/>
        
        <rect id="bridge-l" x="55" y="18" width="3" height="68" rx="1" fill="#b71c1c"/>
        <rect id="bridge-r" x="102" y="18" width="3" height="68" rx="1" fill="#b71c1c"/>

        <g id="khim-visual-group"></g>
        
        <text x="30" y="12" font-family="Sarabun" font-size="5" fill="#888">นอก</text>
        <text x="75" y="12" font-family="Sarabun" font-size="5" fill="#888">กลาง</text>
        <text x="120" y="12" font-family="Sarabun" font-size="5" fill="#888">ใน</text>
    </svg>
</div>

<script>
/* ── ส่วนที่ 2: ฟังก์ชันสำหรับวาดสายและระบบ Hilight (นำไปแทนที่ของเดิม) ── */

function buildStrings() {
    const group = document.getElementById('khim-visual-group');
    group.innerHTML = '';
    
    // วาดสายขิมทั้งหมด 7 แถว (ตามจำนวนโน้ตในแต่ละหย่อง)
    for (let i = 0; i < 7; i++) {
        const y = 25 + (i * 9); // ระยะห่างระหว่างสาย
        
        // วาดสายเส้นบางๆ เป็นพื้นหลัง
        const mainLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        mainLine.setAttribute('x1', '10'); mainLine.setAttribute('y1', y);
        mainLine.setAttribute('x2', '150'); mainLine.setAttribute('y2', y);
        mainLine.setAttribute('stroke', '#4a3520'); mainLine.setAttribute('stroke-width', '0.4');
        group.appendChild(mainLine);

        // สร้างตำแหน่ง Hilight สำหรับ 3 ช่วง (นอก, กลาง, ใน)
        const sections = [
            { id: 'left', x1: 10, x2: 55 },
            { id: 'middle', x1: 58, x2: 102 },
            { id: 'right', x1: 105, x2: 150 }
        ];

        sections.forEach(sec => {
            const hl = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            hl.setAttribute('id', `hl-${sec.id}-${i}`);
            hl.setAttribute('x', sec.x1);
            hl.setAttribute('y', y - 2.5);
            hl.setAttribute('width', sec.x2 - sec.x1);
            hl.setAttribute('height', '5');
            hl.setAttribute('rx', '2');
            hl.setAttribute('fill', '#00f2fe'); // สีฟ้าสว่างตามแบบ
            hl.setAttribute('opacity', '0');     // ปิดไว้ก่อน
            hl.setAttribute('style', 'transition: opacity 0.2s; filter: drop-shadow(0 0 3px #00f2fe);');
            hl.classList.add('khim-highlight');
            group.appendChild(hl);
        });
    }
}

// ระบบ Hilight อัจฉริยะ: เช็คเสียงที่ซ้ำกันในหย่องอื่นด้วย
function highlightString(targetHz) {
    // 1. ปิด Hilight ทั้งหมดก่อน
    document.querySelectorAll('.khim-highlight').forEach(el => {
        el.style.opacity = '0';
    });

    // 2. ค้นหาความถี่ที่ตรงกันในทุกหย่อง
    for (const b in hzData) {
        hzData[b].forEach((hz, idx) => {
            // เช็คว่าความถี่ตรงกับที่เลือกหรือไม่ (ยอมรับค่าต่างได้เล็กน้อยเผื่อทศนิยม)
            if (Math.abs(hz - targetHz) < 1.0) {
                const hlEl = document.getElementById(`hl-${b}-${idx}`);
                if (hlEl) {
                    hlEl.style.opacity = '1';
                }
            }
        });
    }
}

/* ── ส่วนที่ 3: ปรับปรุงฟังก์ชัน renderGrid เล็กน้อยเพื่อให้เรียกใช้ Hilight ตัวใหม่ ── */
function renderGrid() {
    const g = document.getElementById('note-grid');
    g.innerHTML = '';
    noteNames[bridge].forEach((n, i) => {
        const h = hzData[bridge][i];
        const oct = octaveLabels[bridge][i];
        const btn = document.createElement('div');
        btn.className = `note-btn${Math.abs(h - target) < 0.1 ? ' active' : ''}`;
        btn.innerHTML = `<span class="note-btn-name">${n}<small style="font-size:0.6rem;opacity:0.5;margin-left:3px">${oct}</small></span><span class="note-btn-hz">${h} Hz</span>`;
        btn.onclick = () => {
            target = h;
            targetName = n;
            document.getElementById('note-name').innerText = n;
            document.getElementById('target-hz').innerText = h + ' Hz';
            pitchBuffer = [];
            updateNeedle(0);
            renderGrid();
            // เรียกใช้ฟังก์ชัน Hilight โดยส่งค่า Hz ไปเช็คตัวซ้ำ
            highlightString(h); 
        };
        g.appendChild(btn);
    });
}
</script>
