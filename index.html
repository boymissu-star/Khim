<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Tuner PRO - Correct Scale</title>
    <style>
        :root {
            --wood-dark: #3e2723; --wood-main: #5d4037; --accent-blue: #00f2fe; 
            --bridge-red: #b71c1c; --gold: #f1c40f; --white: #ffffff;
            --string-dark: #1a0f0d; 
        }

        body {
            margin: 0; padding: 0; font-family: 'Tahoma', sans-serif;
            background-color: #1a1a1a; color: var(--white); overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .app-container {
            width: 100vw; height: 100vh; max-width: 1200px;
            background: #e5d9c5; display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        @media (min-width: 768px) and (orientation: landscape) {
            .app-container { flex-direction: row; height: 85vh; border-radius: 20px; overflow: hidden; }
            .left-panel { flex: 1; border-right: 4px solid var(--bridge-red); }
            .right-panel { flex: 1.3; }
        }

        .left-panel { display: flex; flex-direction: column; flex: 1; min-height: 0; }
        
        .instrument-section {
            background: radial-gradient(circle, #fdf5e6 0%, #d2b48c 100%);
            padding: 20px; text-align: center; flex: 0.9;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #khim-svg { width: 100%; max-width: 500px; height: auto; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); }

        .khim-string { stroke: var(--string-dark); stroke-width: 0.7; opacity: 0.9; }

        .highlight-bar {
            stroke: var(--accent-blue);
            stroke-width: 4.5;
            stroke-linecap: round;
            opacity: 0;
            transition: opacity 0.2s;
            filter: drop-shadow(0 0 8px var(--accent-blue));
        }
        .highlight-bar.active { opacity: 1; }

        .tuner-display {
            background: linear-gradient(to bottom, #48c9b0, #2e86c1);
            padding: 20px; text-align: center; border-top: 5px solid var(--bridge-red); flex: 1.1;
            display: flex; flex-direction: column; justify-content: center;
        }

        .note-name { font-size: 2.5em; font-weight: bold; }
        .current-hz { font-size: 3.2em; font-weight: bold; font-family: monospace; margin: 5px 0; }
        .status-badge { background: var(--gold); color: #7b241c; padding: 5px 20px; border-radius: 20px; font-weight: bold; font-size: 0.9em; }

        .meter-container { width: 100%; height: 45px; position: relative; background: rgba(0,0,0,0.15); border-radius: 10px; overflow: hidden; }
        .center-line { position: absolute; left: 50%; width: 3px; height: 100%; background: var(--white); z-index: 1; }
        .needle { position: absolute; bottom: 0; left: 50%; width: 5px; height: 100%; background: #ffeb3b; transform: translateX(-50%); transition: left 0.1s ease-out; z-index: 2; }

        .right-panel { display: flex; flex-direction: column; flex: 1.3; background: var(--bridge-red); }
        .bridge-tabs { display: flex; background: #2d1b18; padding: 10px; gap: 8px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 10px; font-weight: bold; color: #ccc; font-size: 0.9em; }
        .tab.active { background: var(--bridge-red); color: var(--white); }

        .note-grid { padding: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; overflow-y: auto; flex: 1; }
        
        .note-btn {
            background: rgba(255,255,255,0.15); aspect-ratio: 1/1; transform: rotate(45deg);
            display: flex; justify-content: center; align-items: center;
            border: 2px solid rgba(255,255,255,0.3); cursor: pointer; margin: 12px;
        }
        .note-btn.active { background: var(--gold); box-shadow: 0 0 15px var(--gold); border-color: white; }
        .note-btn span { transform: rotate(-45deg); font-weight: bold; color: white; font-size: 1.1em; }
        .note-btn.active span { color: #7b241c; }

        #start-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        #start-btn { padding: 15px 50px; font-size: 1.4em; background: var(--gold); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: #7b241c; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="start-overlay">
        <h1 style="color: var(--gold);">Thai Tuner PRO</h1>
        <p style="color: #aaa;">ระบบ 2 หย่อง - ความถี่มาตรฐานที่คุณกำหนด</p>
        <button id="start-btn">เริ่มตั้งสาย</button>
    </div>

    <div class="left-panel">
        <section class="instrument-section">
            <svg id="khim-svg" viewBox="0 0 140 85" xmlns="http://www.w3.org/2000/svg">
                <path d="M25,10 L115,10 Q140,10 135,40 Q130,75 115,77 L25,77 Q10,75 5,40 Q0,10 25,10 Z" fill="var(--wood-dark)"/>
                <path d="M28,13 L112,13 Q132,13 128,40 Q124,70 112,72 L28,72 Q15,70 11,40 Q7,13 28,13 Z" fill="var(--wood-main)"/>
                
                <g fill="#2c1e1c">
                    <circle cx="11" cy="20" r="1"/><circle cx="11" cy="28" r="1"/><circle cx="11" cy="36" r="1"/><circle cx="11" cy="44" r="1"/><circle cx="11" cy="52" r="1"/><circle cx="11" cy="60" r="1"/><circle cx="11" cy="68" r="1"/>
                    <circle cx="129" cy="20" r="1"/><circle cx="129" cy="28" r="1"/><circle cx="129" cy="36" r="1"/><circle cx="129" cy="44" r="1"/><circle cx="129" cy="52" r="1"/><circle cx="129" cy="60" r="1"/><circle cx="129" cy="68" r="1"/>
                </g>

                <rect x="55" y="15" width="2.5" height="58" rx="1" fill="var(--bridge-red)"/> 
                <rect x="85" y="15" width="2.5" height="58" rx="1" fill="var(--bridge-red)"/> 

                <g class="khim-strings">
                    <line x1="12" y1="20" x2="128" y2="20" class="khim-string"/>
                    <line x1="12" y1="28" x2="128" y2="28" class="khim-string"/>
                    <line x1="12" y1="36" x2="128" y2="36" class="khim-string"/>
                    <line x1="12" y1="44" x2="128" y2="44" class="khim-string"/>
                    <line x1="12" y1="52" x2="128" y2="52" class="khim-string"/>
                    <line x1="12" y1="60" x2="128" y2="60" class="khim-string"/>
                    <line x1="12" y1="68" x2="128" y2="68" class="khim-string"/>
                </g>

                <g id="highlight-layer">
                    <!-- แถบไฮไลต์ 7 เส้น ตามจำนวนโน้ตต่อหย่อง -->
                    <line id="h-L-7" x1="25" y1="20" x2="45" y2="20" class="highlight-bar"/>
                    <line id="h-L-6" x1="25" y1="28" x2="45" y2="28" class="highlight-bar"/>
                    <line id="h-L-5" x1="25" y1="36" x2="45" y2="36" class="highlight-bar"/>
                    <line id="h-L-4" x1="25" y1="44" x2="45" y2="44" class="highlight-bar"/>
                    <line id="h-L-3" x1="25" y1="52" x2="45" y2="52" class="highlight-bar"/>
                    <line id="h-L-2" x1="25" y1="60" x2="45" y2="60" class="highlight-bar"/>
                    <line id="h-L-1" x1="25" y1="68" x2="45" y2="68" class="highlight-bar"/>

                    <line id="h-M-7" x1="60" y1="20" x2="80" y2="20" class="highlight-bar"/>
                    <line id="h-M-6" x1="60" y1="28" x2="80" y2="28" class="highlight-bar"/>
                    <line id="h-M-5" x1="60" y1="36" x2="80" y2="36" class="highlight-bar"/>
                    <line id="h-M-4" x1="60" y1="44" x2="80" y2="44" class="highlight-bar"/>
                    <line id="h-M-3" x1="60" y1="52" x2="80" y2="52" class="highlight-bar"/>
                    <line id="h-M-2" x1="60" y1="60" x2="80" y2="60" class="highlight-bar"/>
                    <line id="h-M-1" x1="60" y1="68" x2="80" y2="68" class="highlight-bar"/>

                    <line id="h-R-7" x1="95" y1="20" x2="115" y2="20" class="highlight-bar"/>
                    <line id="h-R-6" x1="95" y1="28" x2="115" y2="28" class="highlight-bar"/>
                    <line id="h-R-5" x1="95" y1="36" x2="115" y2="36" class="highlight-bar"/>
                    <line id="h-R-4" x1="95" y1="44" x2="115" y2="44" class="highlight-bar"/>
                    <line id="h-R-3" x1="95" y1="52" x2="115" y2="52" class="highlight-bar"/>
                    <line id="h-R-2" x1="95" y1="60" x2="115" y2="60" class="highlight-bar"/>
                    <line id="h-R-1" x1="95" y1="68" x2="115" y2="68" class="highlight-bar"/>
                </g>
            </svg>
            <div style="color: var(--wood-dark); font-weight: bold; margin-top: 5px; font-size: 0.9em;" id="bridge-title">หย่องนอก (ซ้าย)</div>
        </section>

        <section class="tuner-display" id="display-bg">
            <div class="note-name" id="display-note">ซอล (สูง)</div>
            <div class="current-hz" id="display-hz">---</div>
            <div><div class="status-badge" id="offset-hz">เป้าหมาย: 755.7 Hz</div></div>
            <div style="margin-top:10px" class="meter-container"><div class="center-line"></div><div class="needle" id="needle"></div></div>
        </section>
    </div>

    <div class="right-panel">
        <div class="bridge-tabs">
            <div class="tab active" onclick="switchBridge('left')">หย่องนอก (ซ้าย)</div>
            <div class="tab" onclick="switchBridge('middle')">หย่องกลาง</div>
            <div class="tab" onclick="switchBridge('right')">หย่องใน (ขวา)</div>
        </div>
        <nav id="note-grid" class="note-grid"></nav>
    </div>
</div>

<script>
    // ชุดข้อมูล Hz ตามที่คุณกำหนดเป๊ะๆ
    const noteData = {
        left: [ 
            {n:"ซอล (สูง)", hz:755.7, r:7}, {n:"ฟาร์", hz:684.4, r:6}, {n:"มี", hz:619.9, r:5}, 
            {n:"เร", hz:561.5, r:4}, {n:"โด", hz:508.5, r:3}, {n:"ที", hz:460.0, r:2}, {n:"ลา", hz:417.2, r:1} 
        ],
        middle: [ 
            {n:"โด", hz:508.5, r:7}, {n:"ที", hz:460.0, r:6}, {n:"ลา", hz:417.2, r:5}, 
            {n:"ซอล", hz:377.8, r:4}, {n:"ฟาร์", hz:342.2, r:3}, {n:"มี", hz:309.9, r:2}, {n:"เร", hz:280.7, r:1} 
        ],
        right: [ 
            {n:"ฟาร์", hz:342.2, r:7}, {n:"มี", hz:309.9, r:6}, {n:"เร", hz:280.7, r:5}, 
            {n:"โด", hz:254.2, r:4}, {n:"ที", hz:230.3, r:3}, {n:"ลา", hz:208.5, r:2}, {n:"ซอล", hz:118.9, r:1} 
        ]
    };

    let audioContext, analyser, targetHz = 755.7, currentBridge = 'left';

    function highlightStrings(hz) {
        document.querySelectorAll('.highlight-bar').forEach(s => s.classList.remove('active'));
        Object.keys(noteData).forEach(bKey => {
            noteData[bKey].forEach(n => {
                if (Math.abs(n.hz - hz) < 0.5) { // เผื่อค่าทศนิยมเล็กน้อย
                    const prefix = bKey === 'left' ? 'L' : bKey === 'middle' ? 'M' : 'R';
                    const el = document.getElementById(`h-${prefix}-${n.r}`);
                    if (el) el.classList.add('active');
                }
            });
        });
    }

    function switchBridge(bridge) {
        currentBridge = bridge;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(window.event) window.event.currentTarget.classList.add('active');
        
        const titleMap = {left: 'หย่องนอก (ซ้าย)', middle: 'หย่องกลาง', right: 'หย่องใน (ขวา)'};
        document.getElementById('bridge-title').innerText = titleMap[bridge];
        
        renderNotes();
    }

    function renderNotes() {
        const grid = document.getElementById('note-grid');
        grid.innerHTML = '';
        noteData[currentBridge].forEach(item => {
            const btn = document.createElement('div');
            btn.className = 'note-btn';
            if (item.hz === targetHz) btn.classList.add('active');
            btn.innerHTML = `<span>${item.n}</span>`;
            btn.onclick = () => {
                targetHz = item.hz;
                document.getElementById('display-note').innerText = item.n;
                document.getElementById('offset-hz').innerText = `เป้าหมาย: ${targetHz} Hz`;
                renderNotes();
                highlightStrings(targetHz);
            };
            grid.appendChild(btn);
        });
    }

    async function startTuner() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 4096; // เพิ่มความละเอียดการวิเคราะห์เสียง
            audioContext.createMediaStreamSource(stream).connect(analyser);
            document.getElementById('start-overlay').style.display = 'none';
            update();
        } catch (e) { alert("กรุณาอนุญาตให้เข้าถึงไมโครโฟน"); }
    }

    function update() {
        const buffer = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buffer);
        const pitch = autoCorrelate(buffer, audioContext.sampleRate);
        
        if (pitch !== -1 && pitch < 1000) {
            document.getElementById('display-hz').innerText = pitch.toFixed(1);
            const diff = pitch - targetHz;
            
            // ปรับเข็ม Tuning
            let moveX = Math.max(-150, Math.min(150, diff * 10));
            document.getElementById('needle').style.left = `calc(50% + ${moveX}px)`;
            
            // เปลี่ยนสีพื้นหลังเมื่อตรงเสียง
            if (Math.abs(diff) < 1.0) {
                document.getElementById('display-bg').style.background = "#2ecc71";
            } else {
                document.getElementById('display-bg').style.background = "linear-gradient(to bottom, #48c9b0, #2e86c1)";
            }
        }
        requestAnimationFrame(update);
    }

    function autoCorrelate(buf, sr) {
        let rms = 0; for (let i=0; i<buf.length; i++) rms += buf[i]*buf[i];
        if (Math.sqrt(rms/buf.length)<0.015) return -1;
        let c = new Array(buf.length).fill(0);
        for (let i=0; i<buf.length; i++) for (let j=0; j<buf.length-i; j++) c[i] += buf[j]*buf[j+i];
        let d=0; while (c[d]>c[d+1]) d++;
        let maxval=-1, maxpos=-1;
        for (let i=d; i<buf.length; i++) if (c[i]>maxval) { maxval=c[i]; maxpos=i; }
        return sr/maxpos;
    }

    document.getElementById('start-btn').onclick = startTuner;
    window.onload = () => { renderNotes(); highlightStrings(targetHz); };
</script>
</body>
</html>
