<style>
    .bridge-selector {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 10px;
    }
    .bridge-btn {
        padding: 5px 15px;
        border-radius: 15px;
        border: 1px solid var(--gold);
        background: transparent;
        color: var(--gold);
        cursor: pointer;
    }
    .bridge-btn.active {
        background: var(--gold);
        color: #7b241c;
    }
</style>

<div class="bridge-selector">
    <button class="bridge-btn" onclick="filterNotes('left')">หย่องซ้าย</button>
    <button class="bridge-btn active" onclick="filterNotes('middle')">หย่องกลาง</button>
    <button class="bridge-btn" onclick="filterNotes('right')">หย่องขวา</button>
</div>

<nav id="note-container" class="note-selector">
    </nav>

<script>
    const noteData = {
        middle: [
            { name: "ท", hz: 246.9 },
            { name: "ล", hz: 220.0 },
            { name: "ซ", hz: 196.0 },
            { name: "ฟ", hz: 174.6 }
        ],
        right: [
            { name: "ร", hz: 293.7 },
            { name: "ด", hz: 261.6 }
        ],
        left: [
            { name: "ม", hz: 329.6 }
        ]
    };

    function filterNotes(bridge) {
        // เปลี่ยนสถานะปุ่มหย่อง
        document.querySelectorAll('.bridge-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');

        // สร้างปุ่มโน้ตใหม่
        const container = document.getElementById('note-container');
        container.innerHTML = '';
        
        noteData[bridge].forEach(item => {
            const btn = document.createElement('div');
            btn.className = 'note-btn';
            btn.innerHTML = `<span>${item.name}</span>`;
            btn.onclick = () => setTarget(item.hz, item.name);
            container.appendChild(btn);
        });
    }

    // เริ่มต้นให้แสดงหย่องกลาง
    window.onload = () => filterNotes('middle');
</script>
